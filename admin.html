<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Monthly Reports</title>
    <meta name="description" content="Admin dashboard for viewing and exporting monthly project reports.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

<body class="admin-page">
    <div class="app-wrapper">
        <!-- Decorative background orbs -->
        <div class="bg-orb bg-orb-1"></div>
        <div class="bg-orb bg-orb-2"></div>
        <div class="bg-orb bg-orb-3"></div>

        <header class="app-header">
            <div class="header-icon admin-header-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            <div class="header-title-group">
                <h1>Admin Dashboard</h1>
                <p class="header-subtitle">View and export monthly reports</p>
            </div>
            <a href="index.html" class="btn-back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12" />
                    <polyline points="12 19 5 12 12 5" />
                </svg>
                Back to Report
            </a>
        </header>

        <!-- Month/Year Picker Section -->
        <section class="form-section" id="filterSection">
            <div class="section-header">
                <div class="section-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                </div>
                <h2>Select Period</h2>
            </div>

            <div class="month-year-picker">
                <div class="picker-nav">
                    <button type="button" class="picker-nav-btn" id="prevYearBtn" onclick="changeYear(-1)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6" />
                        </svg>
                    </button>
                    <span class="picker-year" id="pickerYear">2026</span>
                    <button type="button" class="picker-nav-btn" id="nextYearBtn" onclick="changeYear(1)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6" />
                        </svg>
                    </button>
                </div>
                <div class="month-grid" id="monthGrid">
                    <!-- Months will be rendered by JS -->
                </div>
            </div>
        </section>

        <!-- Reports Table Section -->
        <section class="form-section saved-reports-section" id="savedReportsSection">
            <div class="section-header">
                <div class="section-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                    </svg>
                </div>
                <h2 id="reportsSectionTitle">Reports</h2>
                <div class="section-header-actions">
                    <span class="report-count" id="reportCount">0 reports</span>
                    <button type="button" class="btn-export" id="exportExcelBtn" onclick="exportToExcel()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                            <polyline points="7 10 12 15 17 10" />
                            <line x1="12" y1="15" x2="12" y2="3" />
                        </svg>
                        Export Excel
                    </button>
                    <button type="button" class="btn-clear-all-reports" id="clearAllReportsBtn"
                        onclick="clearAllReports()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                        Clear All
                    </button>
                </div>
            </div>
            <div class="reports-table-wrapper" id="reportsTableWrapper">
                <!-- Loading Spinner -->
                <div class="table-loader" id="tableLoader">
                    <div class="loader-spinner"></div>
                    <p>Loading reports...</p>
                </div>
                <div class="empty-state" id="noReportsMsg" style="display:none;">No reports found for this period.</div>
                <table class="reports-table" id="reportsTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Project</th>
                            <th>Highlights</th>
                            <th>Issues</th>
                            <th>Concerns</th>
                            <th>Risks</th>
                            <th>Need Support</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="reportsTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="admin.js"></script>
</body>

</html>
